camera:
  source: 0
  width: 640
  height: 480
  fps: 15
detection:
  model_path: yolo11n.pt
  target_classes:
  - 0
  confidence_threshold: 0.5
  iou_threshold: 0.45
  input_size: 640
  device: auto
pose:
  enabled: true
  model_path: yolo11n-pose.pt
  confidence_threshold: 0.5
tracking:
  tracker_type: bytetrack
  max_lost_frames: 30
  min_track_length: 10
  trail_length: 50
behavior:
  wandering:
    enabled: true
    loop_threshold: 3
    time_window: 300
    min_path_length: 100
  zones:
    enabled: true
    definitions:
    - name: zone_2
      type: safe
      points:
      - - 339
        - 189
      - - 607
        - 186
      - - 600
        - 461
      - - 319
        - 454
  erratic:
    enabled: true
    direction_change_threshold: 90
    min_changes: 15
    time_window: 30
    min_speed: 30.0
    min_entropy: 0.5
  inactivity:
    enabled: true
    threshold_seconds: 600
    movement_threshold: 15
  gait:
    enabled: true
    stability_threshold: 0.3
    analysis_window: 30
mqtt:
  broker: localhost
  port: 1883
  username: mqtt_user
  password: YOUR_MQTT_PASSWORD
  topic_prefix: etms/vision
  device_id: room_1_camera
  qos: 1
  keepalive: 60
logging:
  level: INFO
  file: logs/vision_service.log
  max_size: 50
performance:
  frame_skip: 2
  use_gpu: true
  num_threads: 4
  tensorrt: false
debug:
  show_display: true
  draw_boxes: true
  draw_pose: true
  draw_trails: true
  draw_zones: true
  save_frames: false
  save_path: debug_frames/
cameras:
- device_id: room_1_camera
  source: 0
  width: 640
  height: 480
  fps: 15
  adjacent_cameras:
  - room_2_camera
  zones:
    enabled: true
    definitions:
    - name: zone_4
      type: restricted
      points:
      - - 70
        - 288
      - - 79
        - 173
      - - 314
        - 171
      - - 310
        - 465
      - - 44
        - 466
      - - 71
        - 285
    - name: zone_5
      type: safe
      points:
      - - 351
        - 178
      - - 600
        - 176
      - - 599
        - 455
      - - 347
        - 453
      - - 351
        - 180
- device_id: room_2_camera
  source: 2
  width: 640
  height: 480
  fps: 15
  adjacent_cameras:
  - room_1_camera
  zones:
    enabled: true
    definitions: []
re_id:
  enabled: true
  max_lost_seconds: 15.0
  aspect_ratio_tolerance: 0.35
  size_tolerance: 0.4
