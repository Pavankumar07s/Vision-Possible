# =============================================
# MQTT Automations for Device: 2412DPC0AI
# Publishes health sensor data to MQTT topics
# for AI engine consumption
# =============================================

# Heart Rate to MQTT
- id: 2412dpc0ai_heart_rate_mqtt
  alias: "Publish 2412DPC0AI Heart Rate to MQTT"
  description: "Publishes heart rate data to MQTT for AI engine"

  trigger:
    - platform: state
      entity_id: sensor.2412dpc0ai_heart_rate

  condition:
    - condition: template
      value_template: "{{ trigger.to_state.state not in ['unknown', 'unavailable'] }}"

  action:
    - service: mqtt.publish
      data:
        topic: "etms/floor/1/mobile/7/heart_rate"
        payload: >
          {"value": {{ states('sensor.2412dpc0ai_heart_rate') | float(0) }},
           "unit": "bpm",
           "timestamp": "{{ now().isoformat() }}",
           "device": "2412DPC0AI"}
        retain: false
        qos: 1

